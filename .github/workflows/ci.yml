name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JavaScript dependencies
        run: npm install

      - name: Install GNOME runtime tooling
        run: sudo apt-get update && sudo apt-get install -y gjs ripgrep

      - name: Run local review checks
        run: ./review-check.sh

      - name: Run GJS syntax check
        run: gjs -c "$(cat charge-power-monitor@mackrais.gmail.com/extension.js)"

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build Bundle
    runs-on: ubuntu-latest
    needs: review

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run local review checks
        run: ./review-check.sh

      - name: Build extension archive
        run: ./build.sh

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: charge-power-monitor-bundle
          path: dist/charge-power-monitor@mackrais.gmail.com.shell-extension.zip
          if-no-files-found: error
